<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TalentSphere Premium Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b3bee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101222",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen font-display">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top Branding & Hero Section -->
<div class="relative h-[45vh] w-full overflow-hidden">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Modern collaborative workspace with glass walls and professional atmosphere" style="background-image: linear-gradient(to bottom, rgba(16, 18, 34, 0.2), rgba(16, 18, 34, 0.9)), url('https://lh3.googleusercontent.com/aida-public/AB6AXuDCSQL4nB1mbYFPrsgOUqhGzcIvQjOrPPnLn-OX5pMmJF7N6Jm9klXhUv7vYggfKC0Lw3lh24FeTf-EuOV73y7PoPjIlwcC9CgUWGG1nkMyju0P7s-5kTOu_pi_5bjP69Um2ws7Mqu_1h9UVDPpkHyIjA3mM50JEBjl6dE08E2IsiPBg0HudtLhObcSwelMt-JpCl7V2F5CrH9fgVzj02L3ioY8-QYPzM1cbC1HyiO3YhQWgdMCLY0dzFrggjmcbcT5EtUqbJWPQVg');">
</div>
<div class="relative z-10 flex h-full flex-col justify-between p-6">
<!-- Logo -->
<div class="flex items-center gap-2">
<div class="bg-primary p-2 rounded-lg">
<span class="material-symbols-outlined text-white text-2xl">rocket_launch</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-white">TalentSphere</h1>
</div>
<!-- Testimonial Glass Card -->
<div class="glass-morphism rounded-xl p-5 mb-4 max-w-sm mx-auto w-full">
<span class="material-symbols-outlined text-primary mb-2">format_quote</span>
<p class="text-white text-lg font-medium leading-tight mb-3">
                        "TalentSphere helped me land my dream role at a top-tier tech firm."
                    </p>
<div class="flex items-center gap-2">
<div class="h-1 w-8 bg-primary rounded-full"></div>
<p class="text-slate-300 text-sm font-semibold uppercase tracking-wider">Success Story</p>
</div>
</div>
</div>
</div>
<!-- Login Form Section -->
<div class="flex-1 px-6 pt-8 pb-10 bg-background-light dark:bg-background-dark rounded-t-[2.5rem] -mt-10 relative z-20">
<div class="max-w-md mx-auto">
<div class="text-center mb-8">
<h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Welcome Back</h2>
<p class="text-slate-500 dark:text-slate-400">Please enter your details to sign in</p>
</div>
<form class="space-y-5">
<!-- Email Input -->
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5 ml-1">Email</label>
<div class="relative">
<input class="w-full bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5 ml-1">Password</label>
<div class="relative group">
<input class="w-full bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-4 pr-12 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<div class="flex justify-end mt-2">
<a class="text-sm font-semibold text-primary hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full bg-gradient-to-r from-primary to-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:shadow-primary/40 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-10 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                        Don't have an account? 
                        <a class="text-primary font-bold ml-1 hover:underline" href="#">Sign Up</a>
</p>
</div>
<!-- Social Login Separator -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-background-light dark:bg-background-dark px-2 text-slate-400">Or continue with</span>
</div>
</div>
<!-- Social Icons -->
<div class="flex gap-4 justify-center">
<button class="flex-1 py-3 px-4 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center justify-center hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors">
<img alt="Google" class="w-5 h-5 mr-2" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC8wniP-V8CiRFyffvgKtnDwX5VySpno4iFvkWE8tMhHWW8ZSF3Vi-w7l1BBwpmHV8hffhKrCg9BOuyOzwcOWiubEO5G46FL5UGVLQDmtcaaU2DsUBR8BiY9bAlEN2WZ44jQ4ltGki3HM-RfKNX1lTywTWJNeSu-_nT-eMoqWgUqBlffrknAq8eqJTmoxQKlJIgrRp421V12F8xbygWx2CtEYpnzyephVniYgP61bUR29jrWhWLOmGo6X80AdhlmSyjPeJXrdNrh2k"/>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex-1 py-3 px-4 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center justify-center hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors">
<span class="material-symbols-outlined text-xl mr-2">ios</span>
<span class="text-sm font-medium">Apple</span>
</button>
</div>
</div>
</div>
<!-- Safe Area Spacer for iOS -->
<div class="h-8 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
