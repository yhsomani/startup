<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TalentSphere Premium Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b3bee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101222",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card:hover {
            border: 1px solid rgba(43, 59, 238, 0.5);
            box-shadow: 0 0 15px rgba(43, 59, 238, 0.2);
        }
        .premium-gradient {
            background: linear-gradient(135deg, #2b3bee 0%, #7c3aed 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-[430px] mx-auto flex-col overflow-x-hidden shadow-2xl">
<!-- Header -->
<div class="flex items-center p-6 pb-2 justify-between">
<div class="text-slate-400 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">close</span>
</div>
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-lg premium-gradient flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">layers</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">TalentSphere</h2>
</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
<div class="px-6 pt-8 pb-4">
<h1 class="text-slate-900 dark:text-white tracking-tight text-3xl font-bold leading-tight">Create Your Account</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Join the elite network of developers and recruiters.</p>
</div>
<!-- Account Type Selector -->
<div class="px-6 py-4">
<h4 class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-widest mb-4">Select Account Type</h4>
<div class="grid grid-cols-2 gap-4">
<!-- Developer Card -->
<div class="glass-card flex flex-col items-center justify-center gap-3 rounded-xl p-6 transition-all cursor-pointer group">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-primary">code</span>
</div>
<p class="text-slate-900 dark:text-white text-sm font-semibold">Developer</p>
</div>
<!-- Recruiter Card -->
<div class="glass-card flex flex-col items-center justify-center gap-3 rounded-xl p-6 transition-all cursor-pointer group">
<div class="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">person_search</span>
</div>
<p class="text-slate-900 dark:text-white text-sm font-semibold">Recruiter</p>
</div>
</div>
</div>
<!-- Registration Form -->
<div class="flex flex-col gap-5 px-6 py-4">
<!-- Name Row -->
<div class="flex gap-4">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-xs font-semibold pb-2 uppercase tracking-wider">First Name</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 h-12 placeholder:text-slate-400 dark:placeholder:text-slate-600 px-4 text-sm font-normal" placeholder="e.g. Alex" value=""/>
</label>
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-xs font-semibold pb-2 uppercase tracking-wider">Last Name</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 h-12 placeholder:text-slate-400 dark:placeholder:text-slate-600 px-4 text-sm font-normal" placeholder="e.g. Morgan" value=""/>
</label>
</div>
<!-- Email -->
<label class="flex flex-col">
<p class="text-slate-700 dark:text-slate-300 text-xs font-semibold pb-2 uppercase tracking-wider">Email Address</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 h-12 placeholder:text-slate-400 dark:placeholder:text-slate-600 px-4 text-sm font-normal" placeholder="alex@company.com" type="email" value=""/>
</label>
<!-- Password -->
<label class="flex flex-col">
<p class="text-slate-700 dark:text-slate-300 text-xs font-semibold pb-2 uppercase tracking-wider">Password</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 h-12 placeholder:text-slate-400 dark:placeholder:text-slate-600 px-4 text-sm font-normal" placeholder="••••••••" type="password" value=""/>
<span class="material-symbols-outlined absolute right-3 top-3 text-slate-500 text-xl cursor-pointer">visibility</span>
</div>
</label>
<!-- Confirm Password -->
<label class="flex flex-col">
<p class="text-slate-700 dark:text-slate-300 text-xs font-semibold pb-2 uppercase tracking-wider">Confirm Password</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 h-12 placeholder:text-slate-400 dark:placeholder:text-slate-600 px-4 text-sm font-normal" placeholder="••••••••" type="password" value=""/>
</label>
</div>
<!-- Submit Button -->
<div class="px-6 py-6">
<button class="w-full h-14 premium-gradient text-white rounded-xl font-bold text-base shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
                Create Account
            </button>
<p class="text-center mt-8 text-sm text-slate-500 dark:text-slate-400">
                Already have an account? 
                <a class="text-primary font-semibold hover:underline" href="#">Sign in</a>
</p>
</div>
<!-- Footer Decoration -->
<div class="mt-auto pb-8 flex justify-center">
<div class="w-32 h-1 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
</div>
</div>
</body></html>
