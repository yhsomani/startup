<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TalentSphere - Password Recovery</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b3bee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101222",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(25, 27, 51, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(43, 59, 238, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Main Container -->
<div class="w-full max-w-[420px] flex flex-col gap-6">
<!-- Header / Logo -->
<div class="flex flex-col items-center gap-2 mb-4">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-3xl">hub</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">TalentSphere</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Professional Excellence</p>
</div>
<!-- Glassmorphic Recovery Card -->
<div class="glass-card rounded-xl p-8 shadow-2xl space-y-8">
<!-- Back Button -->
<div class="flex items-center -ml-2">
<button class="flex items-center gap-1 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors text-sm font-medium">
<span class="material-symbols-outlined text-lg">arrow_back</span>
                    Back to Login
                </button>
</div>
<!-- Content Area (Step 1 Focus) -->
<div class="space-y-6">
<div class="space-y-2">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white">Reset Password</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Enter your work email address and we'll send you a 6-digit verification code.</p>
</div>
<!-- Input Field -->
<div class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Work Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">mail</span>
<input class="w-full bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-primary/20 rounded-lg py-4 pl-12 pr-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="name@company.com" type="email"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2 group">
<span>Send Recovery Code</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
<!-- State Preview: Verification Code (Visual representation of step 2) -->
<div class="pt-6 border-t border-slate-200 dark:border-slate-800">
<div class="opacity-40 pointer-events-none grayscale">
<p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-4">Verification State (Preview)</p>
<div class="flex justify-between gap-2">
<div class="w-12 h-14 bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-primary/20 rounded-lg flex items-center justify-center text-xl font-bold text-primary">6</div>
<div class="w-12 h-14 bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-primary/20 rounded-lg flex items-center justify-center text-xl font-bold"></div>
<div class="w-12 h-14 bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-primary/20 rounded-lg flex items-center justify-center text-xl font-bold"></div>
<div class="w-12 h-14 bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-primary/20 rounded-lg flex items-center justify-center text-xl font-bold"></div>
<div class="w-12 h-14 bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-primary/20 rounded-lg flex items-center justify-center text-xl font-bold"></div>
<div class="w-12 h-14 bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-primary/20 rounded-lg flex items-center justify-center text-xl font-bold"></div>
</div>
</div>
</div>
<!-- State Preview: Reset State (Visual representation of step 3) -->
<div class="pt-6 border-t border-slate-200 dark:border-slate-800">
<div class="opacity-40 pointer-events-none grayscale space-y-4">
<p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Set New Password (Preview)</p>
<div class="h-10 w-full bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-primary/20 rounded-lg"></div>
<div class="h-10 w-full bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-primary/20 rounded-lg"></div>
</div>
</div>
</div>
<!-- Support Info -->
<div class="text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                Need more help? <a class="text-primary font-semibold hover:underline" href="#">Contact TalentSphere Support</a>
</p>
</div>
<!-- Footer Decoration -->
<div class="mt-8 flex justify-center gap-8 opacity-50 grayscale contrast-125">
<div class="h-8 w-24 bg-slate-400 dark:bg-slate-700 rounded blur-[1px]" style="clip-path: polygon(0 20%, 100% 20%, 100% 80%, 0 80%);"></div>
<div class="h-8 w-24 bg-slate-400 dark:bg-slate-700 rounded blur-[1px]" style="clip-path: polygon(0 20%, 100% 20%, 100% 80%, 0 80%);"></div>
</div>
</div>
<!-- Decorative background elements -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
</body></html>
