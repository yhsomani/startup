---
# TalentSphere Kubernetes Secrets Configuration
# For managing OpenAI API, Email Service, and AWS S3 credentials
# Date: March 1, 2026
# 
# IMPORTANT: This is a TEMPLATE. Replace placeholders with actual values.
# Store real secrets in Vault, not in git or ConfigMaps!

apiVersion: v1
kind: Namespace
metadata:
  name: talentsphere
  labels:
    app: talentsphere

---
# Secret: OpenAI API Configuration
# Created from: OPENAI_API_KEY, OPENAI_ORGANIZATION, OPENAI_MODEL
# 
# To create from command line:
# kubectl create secret generic openai-credentials \
#   --from-literal=api-key=sk-your-key \
#   --from-literal=organization=org-your-org \
#   -n talentsphere

apiVersion: v1
kind: Secret
metadata:
  name: openai-credentials
  namespace: talentsphere
  labels:
    app: talentsphere
    service: openai
    managed-by: talentsphere
type: Opaque
data:
  # Base64 encoded credential values
  # GENERATE with: echo -n "value" | base64
  api-key: c2steWL1ci1vcGVuYWktYXBpLWtleQ==  # sk-your-openai-api-key
  organization: b3JnLXlvdXItb3JnYW5pemF0aW9uLWlk  # org-your-organization-id
  model: Z3B0LTQ=  # gpt-4
  temperature: MC43  # 0.7
  max-tokens: MjAwMA==  # 2000

---
# Secret: Email Service Provider Credentials
# Choose ONE of the three options below based on your selection

# OPTION 1: SendGrid Credentials
apiVersion: v1
kind: Secret
metadata:
  name: email-sendgrid-credentials
  namespace: talentsphere
  labels:
    app: talentsphere
    service: email
    provider: sendgrid
type: Opaque
data:
  api-key: U0cueW91ci1zZW5kZ3JpZC1hcGkta2V5  # SG.your-sendgrid-api-key
  from-email: bm9yZXBseUB0YWxlbnRzcGhlcmUuY29t  # noreply@talentsphere.com
  from-name: VGFsZW50U3BoZXJl  # TalentSphere

---
# OPTION 2: Mailgun Credentials (comment out if using SendGrid)
apiVersion: v1
kind: Secret
metadata:
  name: email-mailgun-credentials
  namespace: talentsphere
  labels:
    app: talentsphere
    service: email
    provider: mailgun
type: Opaque
data:
  api-key: a2V5LXlvdXItbWFpbGd1bi1hcGkta2V5  # key-your-mailgun-api-key
  domain: bWFpbC50YWxlbnRzcGhlcmUuY29t  # mail.talentsphere.com
  from-email: bm9yZXBseUB0YWxlbnRzcGhlcmUuY29t  # noreply@talentsphere.com

---
# Secret: AWS S3 Credentials
# Created from: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_S3_BUCKET
# 
# To create from command line:
# kubectl create secret generic aws-s3-credentials \
#   --from-literal=access-key-id=AKIA... \
#   --from-literal=secret-access-key=... \
#   --from-literal=bucket=talentsphere-uploads \
#   -n talentsphere

apiVersion: v1
kind: Secret
metadata:
  name: aws-s3-credentials
  namespace: talentsphere
  labels:
    app: talentsphere
    service: aws-s3
type: Opaque
data:
  access-key-id: QUtJQVlPVVJBV1NLRVlLRVlQTEFDRUhPTERFUg==  # AKIAYOURASKEYPLACEHOLDER
  secret-access-key: and0YWxyWFVlbkZFTUkvSzdNREVOR1NlY3JldEtleVBsYWNl  # Your base64 encoded secret
  bucket-name: dGFsZW50c3BoZXJlLXVwbG9hZHM=  # talentsphere-uploads
  region: dXMtZWFzdC0x  # us-east-1

---
# ConfigMap: Non-Sensitive Configuration
# These are non-sensitive configuration values that can be stored in ConfigMap
# Sensitive values (API keys, passwords) should stay in Secrets

apiVersion: v1
kind: ConfigMap
metadata:
  name: talentsphere-config
  namespace: talentsphere
  labels:
    app: talentsphere
data:
  # OpenAI Configuration
  OPENAI_MODEL: "gpt-4"
  OPENAI_TEMPERATURE: "0.7"
  OPENAI_MAX_TOKENS: "2000"
  
  # Email Configuration
  EMAIL_SERVICE: "sendgrid"  # or "mailgun" or "gmail"
  SENDGRID_FROM_EMAIL: "noreply@talentsphere.com"
  SENDGRID_FROM_NAME: "TalentSphere"
  
  # AWS S3 Configuration
  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "talentsphere-uploads"
  AWS_S3_ENABLE_VERSIONING: "true"
  AWS_S3_ENABLE_LIFECYCLE: "true"
  AWS_S3_LIFECYCLE_DAYS: "90"
  
  # Application Configuration
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  
  # Service Configuration
  API_GATEWAY_PORT: "8000"
  AUTH_SERVICE_PORT: "3001"

---
# Deployment Example: Using Secrets in Pod
# Shows how to inject the secrets into your applications

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: talentsphere
  labels:
    app: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: talentsphere/api-gateway:latest
        ports:
        - containerPort: 8000
        
        # Environment variables from Secrets
        env:
        # OpenAI Configuration
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-credentials
              key: api-key
        - name: OPENAI_ORGANIZATION
          valueFrom:
            secretKeyRef:
              name: openai-credentials
              key: organization
        - name: OPENAI_MODEL
          valueFrom:
            configMapKeyRef:
              name: talentsphere-config
              key: OPENAI_MODEL
        
        # Email Configuration (SendGrid)
        - name: SENDGRID_API_KEY
          valueFrom:
            secretKeyRef:
              name: email-sendgrid-credentials
              key: api-key
        - name: SENDGRID_FROM_EMAIL
          valueFrom:
            configMapKeyRef:
              name: talentsphere-config
              key: SENDGRID_FROM_EMAIL
        
        # AWS S3 Configuration
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-s3-credentials
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-s3-credentials
              key: secret-access-key
        - name: AWS_S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: talentsphere-config
              key: AWS_S3_BUCKET
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: talentsphere-config
              key: AWS_REGION
        
        # General Configuration
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: talentsphere-config
              key: NODE_ENV
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: talentsphere-config
              key: LOG_LEVEL

---
# Secret: HashiCorp Vault Integration (Recommended for Production)
# For better secret management, use external Vault instead of K8s Secrets
# 
# Prerequisites: HashiCorp Vault must be running
# Enable Kubernetes auth method:
# vault auth enable kubernetes
# vault write auth/kubernetes/config kubernetes_host="https://$KUBERNETES_SERVICE_HOST"

apiVersion: v1
kind: ServiceAccount
metadata:
  name: talentsphere-vault
  namespace: talentsphere

---
apiVersion: v1
kind: Secret
metadata:
  name: talentsphere-vault-auth
  namespace: talentsphere
  annotations:
    kubernetes.io/service-account.name: talentsphere-vault
type: kubernetes.io/service-account-token

---
# ClusterRole for reading Secrets (least privilege)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: talentsphere-secret-reader
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
  resourceNames:
  - openai-credentials
  - email-sendgrid-credentials
  - email-mailgun-credentials
  - aws-s3-credentials

---
# ClusterRoleBinding: Bind the role to service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: talentsphere-secret-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: talentsphere-secret-reader
subjects:
- kind: ServiceAccount
  name: talentsphere-vault
  namespace: talentsphere

---
# NetworkPolicy: Restrict Secret Access
# Only allow API Gateway and core services to access secrets
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: talentsphere-secret-access
  namespace: talentsphere
spec:
  podSelector:
    matchLabels:
      access: secrets
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    - podSelector:
        matchLabels:
          app: auth-service
    - podSelector:
        matchLabels:
          app: notification-service
