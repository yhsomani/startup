server:
  port: 3007

spring:
  application:
    name: search-service
  
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/talentsphere_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update

logging:
  level:
    com.talentsphere: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
