server:
  port: 3011

spring:
  application:
    name: analytics-service
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/talentsphere_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update

logging:
  level:
    com.talentsphere: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
