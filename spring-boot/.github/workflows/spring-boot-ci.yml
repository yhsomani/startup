name: Spring Boot CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'spring-boot/**'
  pull_request:
    branches: [main]
    paths:
      - 'spring-boot/**'

env:
  JAVA_VERSION: '25'
  MAVEN_OPTS: -Xmx2048m

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: spring-boot
        run: ./mvnw clean compile -DskipTests

      - name: Run tests
        working-directory: spring-boot
        run: ./mvnw test

      - name: Run SonarQube analysis
        working-directory: spring-boot
        run: ./mvnw sonar:sonar -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run OWASP Dependency Check
        working-directory: spring-boot
        run: ./mvnw org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Build Docker images
        working-directory: spring-boot
        run: |
          for service in auth-service user-service job-service company-service analytics-service file-service video-service email-service challenge-service gamification-service notification-service search-service application-service user-profile-service api-gateway; do
            ./mvnw clean package -pl $service -am -DskipTests
            docker build -t talentsphere/$service:latest -f $service/Dockerfile $service/
          done

      - name: Push to Registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          for service in auth-service user-service job-service company-service analytics-service file-service video-service email-service challenge-service gamification-service notification-service search-service application-service user-profile-service api-gateway; do
            docker push talentsphere/$service:latest
          done
        continue-on-error: true
