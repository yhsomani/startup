server:
  port: 8000

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:3001
          predicates:
            - Path=/api/v1/auth/**
          
        - id: user-service
          uri: http://localhost:3002
          predicates:
            - Path=/api/v1/profiles/**,/api/v1/users/**
          
        - id: user-profile-service
          uri: http://localhost:3009
          predicates:
            - Path=/api/v1/user-profile/**
          
        - id: job-service
          uri: http://localhost:3010
          predicates:
            - Path=/api/v1/jobs/**
          filters:
            - StripPrefix=0
           
        - id: application-service
          uri: http://localhost:3008
          predicates:
            - Path=/api/v1/applications/**
          
        - id: search-service
          uri: http://localhost:3007
          predicates:
            - Path=/api/v1/search/**
          
        - id: notification-service
          uri: http://localhost:4005
          predicates:
            - Path=/api/v1/notifications/**
          
        - id: analytics-service
          uri: http://localhost:3011
          predicates:
            - Path=/api/v1/analytics/**
          
        - id: video-service
          uri: http://localhost:3014
          predicates:
            - Path=/api/v1/videos/**
          
        - id: gamification-service
          uri: http://localhost:5007
          predicates:
            - Path=/api/v1/gamification/**,/api/v1/leaderboard/**
           
        - id: company-service
          uri: http://localhost:4006
          predicates:
            - Path=/api/v1/companies/**
           
        - id: email-service
          uri: http://localhost:4007
          predicates:
            - Path=/api/v1/emails/**
           
        - id: file-service
          uri: http://localhost:3013
          predicates:
            - Path=/api/v1/files/**
           
        - id: challenge-service
          uri: http://localhost:5000
          predicates:
            - Path=/api/v1/challenges/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 50

jwt:
  secret: ${JWT_SECRET:talentsphere-secret-key-for-jwt-signing-minimum-256-bits}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      auth-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      job-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
  retry:
    instances:
      auth-service:
        maxAttempts: 3
        waitDuration: 2s
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
      job-service:
        maxAttempts: 3
        waitDuration: 2s
