server:
  port: 8000

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:3001
          predicates:
            - Path=/api/v1/auth/**
          
        - id: user-service
          uri: http://localhost:3002
          predicates:
            - Path=/api/v1/profiles/**,/api/v1/users/**
          
        - id: user-profile-service
          uri: http://localhost:3009
          predicates:
            - Path=/api/v1/user-profile/**
          
        - id: job-service
          uri: http://localhost:3010
          predicates:
            - Path=/api/v1/jobs/**,/api/v1/applications/**
          
        - id: search-service
          uri: http://localhost:3007
          predicates:
            - Path=/api/v1/search/**
          
        - id: notification-service
          uri: http://localhost:4005
          predicates:
            - Path=/api/v1/notifications/**
          
        - id: analytics-service
          uri: http://localhost:3011
          predicates:
            - Path=/api/v1/analytics/**
          
        - id: video-service
          uri: http://localhost:3014
          predicates:
            - Path=/api/v1/videos/**
          
        - id: gamification-service
          uri: http://localhost:5007
          predicates:
            - Path=/api/v1/gamification/**,/api/v1/leaderboard/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:talentsphere-secret-key-for-jwt-signing-minimum-256-bits}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
