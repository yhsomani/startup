server:
  port: 3013

spring:
  application:
    name: file-service
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/talentsphere_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

file:
  upload:
    directory: ${FILE_UPLOAD_DIR:./uploads}
  base-url: ${FILE_BASE_URL:http://localhost:3013}

logging:
  level:
    com.talentsphere: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
