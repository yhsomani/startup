server:
  port: 4007

spring:
  application:
    name: email-service
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/talentsphere_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    com.talentsphere: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
