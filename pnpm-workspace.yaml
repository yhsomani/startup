# TalentSphere Workspaces Configuration
# This file defines workspace packages for the monorepo

packages:
  # API Gateway
  - 'api-gateway'

  # Backend services (primary implementation)
  - 'backends/backend-enhanced/*'
  
  # Additional backend services
  - 'services/*'
  
  # Frontend applications and packages
  - 'frontend/ts-mfe-*'
  - 'frontend/packages/*'

  # NOTE: These are archived/experimental implementations (not currently in use)
  # - 'backends/ai-service'
  # - 'backends/challenge-service'
  # - 'backends/lms-service'
  # - 'backends/collaboration-service'
